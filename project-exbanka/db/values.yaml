image: postgres:17-alpine

# Persistent storage for the shared postgres instance. Standard SSD
# (managed-csi) is the cheapest managed disk. NOTE: this MUST match (or exceed)
# the live PVC's actual capacity — Kubernetes forbids shrinking a PVC, so a
# value below the provisioned size makes `helm upgrade` fail. The live
# postgres-shared-data PVC is 8Gi (Azure provisioned), so keep this at 8Gi.
storage:
  className: managed-csi
  size: 8Gi

instances:
  user-db:
    dbName: user_db
  auth-db:
    dbName: auth_db
  client-db:
    dbName: clientdb
  account-db:
    dbName: accountdb
  card-db:
    dbName: carddb
  transaction-db:
    dbName: transactiondb
  credit-db:
    dbName: creditdb
  exchange-db:
    dbName: exchangedb
  stock-db:
    dbName: stockdb
  verification-db:
    dbName: verificationdb
  notification-db:
    dbName: notification_db
