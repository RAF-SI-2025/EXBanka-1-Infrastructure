{{- if .Values.vpa.enabled }}
{{- range $name, $svc := .Values.microservices }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "exbanka-backend.labels" $ | nindent 4 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}
  updatePolicy:
    updateMode: {{ $.Values.vpa.updateMode | quote }}
{{- end }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "exbanka-backend.labels" . | nindent 4 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  updatePolicy:
    updateMode: {{ .Values.vpa.updateMode | quote }}
{{- end }}
