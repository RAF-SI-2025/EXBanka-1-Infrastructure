apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: {{ .Release.Namespace }}
  labels:
    app: influxdb
    component: infrastructure
    {{- include "exbanka-infrastructure.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
        component: infrastructure
    spec:
      {{- include "exbanka-infrastructure.podSecurityContext" . | nindent 6 }}
      containers:
        - name: influxdb
          image: {{ .Values.influxdb.image }}
          {{- include "exbanka-infrastructure.containerSecurityContext" . | nindent 10 }}
          ports:
            - containerPort: 8086
              name: http
          env:
            - name: DOCKER_INFLUXDB_INIT_MODE
              value: setup
            - name: DOCKER_INFLUXDB_INIT_USERNAME
              value: admin
            - name: DOCKER_INFLUXDB_INIT_PASSWORD
              value: adminpassword
            - name: DOCKER_INFLUXDB_INIT_ORG
              value: {{ .Values.influxdb.org | quote }}
            - name: DOCKER_INFLUXDB_INIT_BUCKET
              value: {{ .Values.influxdb.bucket | quote }}
            - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
              value: {{ .Values.influxdb.adminToken | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/influxdb2
          readinessProbe:
            httpGet:
              path: /ping
              port: 8086
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: 8086
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: {{ .Release.Namespace }}
  labels:
    app: influxdb
    component: infrastructure
spec:
  selector:
    app: influxdb
  ports:
    - port: 8086
      targetPort: 8086
      name: http
