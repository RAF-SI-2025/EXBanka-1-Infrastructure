apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app: api-gateway
    component: service
    {{- include "exbanka-backend.labels" . | nindent 4 }}
  {{- if .Values.keel.enabled }}
  annotations:
    {{- include "exbanka-backend.keelAnnotations" . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.apiGateway.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        component: service
      annotations:
        {{- include "exbanka-backend.rolloutAnnotation" . | nindent 8 }}
    spec:
      {{- include "exbanka-backend.podSecurityContext" . | nindent 6 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      containers:
        - name: api-gateway
          image: "{{ .Values.apiGateway.image }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- include "exbanka-backend.containerSecurityContext" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.apiGateway.port }}
              name: http
            - containerPort: {{ .Values.apiGateway.metricsPort }}
              name: metrics
          env:
            {{- range $key, $value := .Values.apiGateway.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /startupz
              port: metrics
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: metrics
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app: api-gateway
    component: service
spec:
  selector:
    app: api-gateway
  ports:
    - port: {{ .Values.apiGateway.port }}
      targetPort: http
      name: http
    - port: {{ .Values.apiGateway.metricsPort }}
      targetPort: metrics
      name: metrics
