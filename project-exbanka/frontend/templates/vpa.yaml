{{- if .Values.vpa.enabled }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "exbanka-frontend.labels" . | nindent 4 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  updatePolicy:
    updateMode: {{ .Values.vpa.updateMode | quote }}
{{- end }}
