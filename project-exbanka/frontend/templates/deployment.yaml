apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: frontend
    component: frontend
    gitops-probe: flux-sync-test
    {{- include "exbanka-frontend.labels" . | nindent 4 }}
  {{- if .Values.keel.enabled }}
  annotations:
    {{- include "exbanka-frontend.keelAnnotations" . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        component: frontend
      annotations:
        {{- include "exbanka-frontend.rolloutAnnotation" . | nindent 8 }}
    spec:
      {{- include "exbanka-frontend.podSecurityContext" . | nindent 6 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ .Values.image }}:{{ .Values.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- include "exbanka-frontend.containerSecurityContext" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.port }}
              name: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
