      USER_DB_PORT: "5432"
      USER_DB_USER: postgres
      USER_DB_PASSWORD: postgres
      USER_DB_NAME: user_db
      USER_GRPC_ADDR: ":50052"
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      USER_DB_SSLMODE: disable
      METRICS_PORT: "9102"
      CLIENT_GRPC_ADDR: "client-service:50054"

