# ---------------------------------------------------------------------------
# API Gateway (HTTP)
# ---------------------------------------------------------------------------
apiGateway:
  image: ghcr.io/raf-si-2025/exbanka-1-backend/api-gateway
  replicas: 1
  port: 8080
  metricsPort: 9100
  env:
    GATEWAY_HTTP_ADDR: ":8080"
    AUTH_GRPC_ADDR: "auth-service:50051"
    USER_GRPC_ADDR: "user-service:50052"
    CLIENT_GRPC_ADDR: "client-service:50054"
    ACCOUNT_GRPC_ADDR: "account-service:50055"
    CARD_GRPC_ADDR: "card-service:50056"
    TRANSACTION_GRPC_ADDR: "transaction-service:50057"
    CREDIT_GRPC_ADDR: "credit-service:50058"
    EXCHANGE_GRPC_ADDR: "exchange-service:50059"
    STOCK_GRPC_ADDR: "stock-service:50060"
    VERIFICATION_GRPC_ADDR: "verification-service:50061"
    NOTIFICATION_GRPC_ADDR: "notification-service:50053"
    INTERBANK_GRPC_ADDR: "interbank-service:50062"
    KAFKA_BROKERS: kafka:9092
    REDIS_ADDR: "redis:6379"
    OWN_BANK_CODE: "333"
    METRICS_PORT: "9100"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ---------------------------------------------------------------------------
# Seeder (Helm hook Job — runs after every install/upgrade)
# ---------------------------------------------------------------------------
seeder:
  image: ghcr.io/raf-si-2025/exbanka-1-backend/seeder
  env:
    USER_GRPC_ADDR: "user-service:50052"
    AUTH_GRPC_ADDR: "auth-service:50051"
    CLIENT_GRPC_ADDR: "client-service:50054"
    KAFKA_BROKERS: "kafka:9092"
    ADMIN_EMAIL: "admin+testadmin@admin.com"
    ADMIN_PASSWORD: "AdminAdmin2026!."
    SEEDER_COOLDOWN: "10s"


# ---------------------------------------------------------------------------
# Vertical Pod Autoscaler
# Start with Off to observe recommendations before enabling Auto
# ---------------------------------------------------------------------------
vpa:
  enabled: true
  updateMode: "Auto"

# ---------------------------------------------------------------------------
# Kubernetes Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  pathPrefix: /instance3
  host: ""
  annotations: {}
  tls: []
