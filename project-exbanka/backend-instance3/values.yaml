global:
  imageTag: latest
  imagePullPolicy: Always
  # Set to current unix timestamp to force a re-pull of "latest" tag
  forceRollout: ""
  # Create with: kubectl create secret docker-registry ghcr-secret \
  #   --docker-server=ghcr.io --docker-username=<USER> --docker-password=<TOKEN> \
  #   -n project-exbanka
  imagePullSecrets:
    - ghcr-secret

serviceDefaults:
  replicas: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

