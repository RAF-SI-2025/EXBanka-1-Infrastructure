apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frontend
  namespace: frontend
spec:
  interval: 5m
  releaseName: frontend
  chart:
    spec:
      chart: project-exbanka/frontend
      sourceRef:
        kind: GitRepository
        name: exbanka-infra
        namespace: flux-system
      interval: 1m
  install:
    createNamespace: false
  upgrade:
    remediation:
      retries: 2
  # Overrides captured from the live release (host / TLS / VPA).
  values:
    ingress:
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      host: exbanka.vlupsic.dev
      tls:
        - hosts:
            - exbanka.vlupsic.dev
          secretName: exbanka-tls
    vpa:
      enabled: false
