apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: db
  namespace: project-exbanka-instance1
spec:
  interval: 5m
  releaseName: db
  chart:
    spec:
      chart: project-exbanka/db
      sourceRef:
        kind: GitRepository
        name: exbanka-infra
        namespace: flux-system
      interval: 1m
  install:
    createNamespace: false
  upgrade:
    remediation:
      retries: 2
  # No value overrides — db uses pure chart defaults (matches live release).
