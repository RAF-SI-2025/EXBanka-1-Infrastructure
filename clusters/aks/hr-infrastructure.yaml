apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: infrastructure
  namespace: project-exbanka-instance1
spec:
  interval: 5m
  releaseName: infrastructure
  chart:
    spec:
      chart: project-exbanka/infrastructure
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: exbanka-infra
        namespace: flux-system
      interval: 1m
  install:
    createNamespace: false
  upgrade:
    remediation:
      retries: 2
  # No value overrides — infrastructure uses pure chart defaults (matches live release).
