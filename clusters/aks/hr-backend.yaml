apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: backend
  namespace: project-exbanka-instance1
spec:
  interval: 5m
  releaseName: backend
  # Wait for db + infrastructure to reconcile before (re)deploying backend.
  dependsOn:
    - name: db
      namespace: project-exbanka-instance1
    - name: infrastructure
      namespace: project-exbanka-instance1
  chart:
    spec:
      chart: project-exbanka/backend-instance1
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: exbanka-infra
        namespace: flux-system
      interval: 1m
  install:
    createNamespace: false
  upgrade:
    remediation:
      retries: 2
  # Overrides captured from the live release (host / TLS / VPA).
  values:
    ingress:
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      host: exbanka.vlupsic.dev
      tls:
        - hosts:
            - exbanka.vlupsic.dev
          secretName: exbanka-tls
    vpa:
      enabled: false
